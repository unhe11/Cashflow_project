{% extends 'cashflow/base.html' %}

{% block title %}Удаление {{ type }}{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-danger text-white">
                    <h5><i class="fas fa-exclamation-triangle me-2"></i>Подтверждение удаления</h5>
                </div>
                <div class="card-body">
                    <p class="lead">Вы уверены, что хотите удалить {{ type }} <strong>"{{ object.name }}"</strong>?</p>

                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex justify-content-between">
                            <a href="{% url 'cashflow:directory_management' %}" class="btn btn-secondary">
                                <i class="fas fa-times me-1"></i>Отмена
                            </a>
                            <button type="submit" class="btn btn-danger">
                                <i class="fas fa-trash me-1"></i>Удалить
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
