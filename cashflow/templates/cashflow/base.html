<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Управление ДДС{% endblock %}</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f8f9fa;
            padding-top: 20px;
        }
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .navbar-custom {
            background-color: #2c3e50;
            padding: 10px 0;
            margin-bottom: 30px;
            border-radius: 10px;
        }
        .navbar-custom .navbar-brand {
            color: white;
            font-weight: bold;
            font-size: 1.5rem;
        }
        .navbar-custom .nav-link {
            color: rgba(255,255,255,.8) !important;
        }
        .navbar-custom .nav-link:hover {
            color: white !important;
        }
        .table-container {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        .filter-section {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        .btn-action {
            margin: 2px;
        }
        .btn-sm-custom {
            padding: 2px 8px;
            font-size: 12px;
        }
        .badge-status {
            font-size: 0.85rem;
            padding: 5px 12px;
        }
        .alert-messages {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            min-width: 300px;
        }
        .amount-positive {
            color: #198754;
            font-weight: bold;
        }
        .amount-negative {
            color: #dc3545;
            font-weight: bold;
        }
        .card {
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.08);
        }
        .card-header {
            background-color: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
            font-weight: bold;
        }
        .pagination-container {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- Навигация -->
        <nav class="navbar navbar-expand-lg navbar-custom">
            <div class="container-fluid">
                <a class="navbar-brand" href="{% url 'cashflow:index' %}">
                    <i class="fas fa-money-bill-wave me-2"></i>Управление ДДС
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav me-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'cashflow:index' %}">
                                <i class="fas fa-list me-1"></i>Записи
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'cashflow:record_create' %}">
                                <i class="fas fa-plus-circle me-1"></i>Создать запись
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'cashflow:directory_management' %}">
                                <i class="fas fa-cog me-1"></i>Справочники
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <!-- Сообщения -->
        <div class="alert-messages">
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}
        </div>

        <!-- Контент -->
        {% block content %}
        {% endblock %}
    </div>

    <!-- Bootstrap JS и зависимости -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    {% block extra_js %}
    {% endblock %}
</body>
</html>
